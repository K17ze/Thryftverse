services:
  postgres:
    ports: []

  redis:
    ports: []

  minio:
    ports: []
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}

  minio-init:
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required} ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}; do
        echo 'Waiting for MinIO...';
        sleep 1;
      done;
      mc mb --ignore-existing local/${S3_BUCKET:?S3_BUCKET is required};
      "

  key-service:
    ports: []
    environment:
      NODE_ENV: production
      KEY_SERVICE_REGION: ${KEY_SERVICE_REGION:?KEY_SERVICE_REGION is required}
      KEY_SERVICE_COUNTRY: ${KEY_SERVICE_COUNTRY:?KEY_SERVICE_COUNTRY is required}
      KEY_SERVICE_MASTER_KEY_B64: ${KEY_SERVICE_MASTER_KEY_B64:?KEY_SERVICE_MASTER_KEY_B64 is required}
      KEY_SERVICE_CLIENT_TOKEN: ${KEY_SERVICE_CLIENT_TOKEN:?KEY_SERVICE_CLIENT_TOKEN is required}
      KEY_SERVICE_ADMIN_TOKEN: ${KEY_SERVICE_ADMIN_TOKEN:?KEY_SERVICE_ADMIN_TOKEN is required}

  api:
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      DATABASE_REPLICA_URL: ${DATABASE_REPLICA_URL:-}
      REDIS_URL: redis://redis:6379
      KEY_SERVICE_URL: http://key-service:4100
      KEY_SERVICE_CLIENT_TOKEN: ${KEY_SERVICE_CLIENT_TOKEN:?KEY_SERVICE_CLIENT_TOKEN is required}
      KEY_SERVICE_ADMIN_TOKEN: ${KEY_SERVICE_ADMIN_TOKEN:?KEY_SERVICE_ADMIN_TOKEN is required}
      API_SECURITY_ADMIN_TOKEN: ${API_SECURITY_ADMIN_TOKEN:?API_SECURITY_ADMIN_TOKEN is required}
      API_ENABLE_MOCK_WEBHOOKS: "false"
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET:?AUTH_ACCESS_TOKEN_SECRET is required}
      AUTH_REFRESH_TOKEN_SECRET: ${AUTH_REFRESH_TOKEN_SECRET:?AUTH_REFRESH_TOKEN_SECRET is required}
      AUTH_EMAIL_PROVIDER: ${AUTH_EMAIL_PROVIDER:-resend}
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM:?AUTH_EMAIL_FROM is required}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY is required}
      KYC_DEFAULT_VENDOR: ${KYC_DEFAULT_VENDOR:?KYC_DEFAULT_VENDOR is required}
      KYC_VERIFICATION_BASE_URL: ${KYC_VERIFICATION_BASE_URL:?KYC_VERIFICATION_BASE_URL is required}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?S3_PUBLIC_ENDPOINT is required}
      S3_REGION: ${S3_REGION:?S3_REGION is required}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      S3_FORCE_PATH_STYLE: "true"
      ML_SERVICE_URL: http://ml-service:8000
      EXPO_PUSH_API_URL: ${EXPO_PUSH_API_URL:-https://exp.host/--/api/v2/push/send}
      PUSH_DEFAULT_CHANNEL: ${PUSH_DEFAULT_CHANNEL:-default}
      SENTRY_DSN: ${SENTRY_DSN:?SENTRY_DSN is required}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.15}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_HTTP_URL: ${OTEL_EXPORTER_OTLP_HTTP_URL:-}
      AUCTION_SWEEP_INTERVAL_MS: ${AUCTION_SWEEP_INTERVAL_MS:-30000}
      GOOGLE_OAUTH_CLIENT_IDS: ${GOOGLE_OAUTH_CLIENT_IDS:?GOOGLE_OAUTH_CLIENT_IDS is required}
      APPLE_OAUTH_AUDIENCE: ${APPLE_OAUTH_AUDIENCE:?APPLE_OAUTH_AUDIENCE is required}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      WISE_API_KEY: ${WISE_API_KEY:-}
      WISE_WEBHOOK_SECRET: ${WISE_WEBHOOK_SECRET:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      ONEZE_ATTESTATION_SIGNING_SECRET: ${ONEZE_ATTESTATION_SIGNING_SECRET:?ONEZE_ATTESTATION_SIGNING_SECRET is required}

  ml-service:
    ports: []
