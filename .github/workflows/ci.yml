name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck and Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Design token guard
        run: npm run lint:design-tokens

      - name: Run test suite
        run: npm run test

      - name: Install backend dependencies
        working-directory: backend/api
        run: npm ci

      - name: Backend build
        working-directory: backend/api
        run: npm run build

      - name: Backend tests
        working-directory: backend/api
        run: npm run test
